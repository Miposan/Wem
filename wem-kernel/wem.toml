# Wem Kernel 配置文件
#
# 所有配置项都有默认值，此文件完全可选。
# 配置优先级：环境变量 > 配置文件 > 默认值
#
# 环境变量映射：
#   WEM_PORT              → server.port
#   WEM_HOST              → server.host
#   WEM_DB_PATH           → database.path
#   WEM_SNAPSHOT_THRESHOLD → oplog.snapshot_threshold
#   WEM_CONFIG            → 配置文件路径（默认 wem.toml）

[server]
# HTTP 监听端口（默认 6809）
port = 6809
# HTTP 绑定地址
host = "0.0.0.0"

[database]
# SQLite 数据库文件路径（相对于工作目录）
# 启动时自动创建父目录
path = "wem-data/wem.db"

[oplog]
# 自动创建快照的操作数阈值
# 每隔 N 次操作自动创建一次快照（用于版本回放加速）
snapshot_threshold = 50
